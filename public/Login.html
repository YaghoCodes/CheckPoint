<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/styleLogin.css">
    <title>Login</title>
</head>

<body>
    <div class="container-main">
        <h1 class="logo"><span class="texto-azul">Check</span>Point</h1>
        <h3 class="texto-teste">Onde você parou te <span class="texto-azul">espera.</span></h3>
        <p class="sub-texto">Acesse sua biblioteca, suas listas e continue de onde parou.</p>

        <div class="box-cadastro">
            <form>
                <label for="email">EMAIL</label>
                <input type="email" id="email" placeholder="voce@email.com">
                <label for="senha">SENHA</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres">

                <button type="submit" class="btn-cadastrar">Criar conta</button>

            </form>
        </div>
        <p class="login-link" id="cadastrar-link">Ainda não tem conta? <a href="cadastro.html">Criar conta</a></p>
    </div>
</body>

</html>
